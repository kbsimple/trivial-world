# Netlify configuration for the Generator app (Next.js static export)
# This file is only used when deploying the generator site.

[build]
  command = "pnpm install && pnpm build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# No Next.js plugin needed — app uses output: 'export' (fully static).
# The @netlify/plugin-nextjs plugin is for SSR/ISR only and is not
# installed in package.json. Static files are served directly from out/.

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Pack API — static JSON files served as application/json with CORS for mobile app
[[headers]]
  for = "/api/v1/*"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/packs/*.json"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Cache-Control = "public, max-age=86400, immutable"
    Access-Control-Allow-Origin = "*"