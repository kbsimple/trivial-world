<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <base href="/" />
    <title>Trivial World</title>
    <meta name="description" content="In-person social trivia game for groups" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trivial World" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <!-- Polyfill for React Native NativeModules on web -->
    <script>
      // React Native bundles an XHR-based fetch polyfill (whatwg-fetch over XHR).
      // On Chromium the XHR constructor throws "Cannot assign to read only property 'NONE'"
      // because Event.prototype.NONE is non-configurable and the RN Event class tries
      // this.NONE = void 0 in strict mode.  Preserving the native browser fetch as a
      // non-overridable getter prevents the bundle from replacing it, so all fetch() calls
      // use the browser's native implementation instead.
      (function() {
        var _nativeFetch = window.fetch && window.fetch.bind(window);
        if (_nativeFetch) {
          Object.defineProperty(window, 'fetch', {
            get: function() { return _nativeFetch; },
            set: function() { /* block RN XHR-based polyfill replacement */ },
            configurable: false, enumerable: true,
          });
        }
      })();
    </script>
    <script>
      // Suppress "Failed to set polyfill" messages emitted by React Native's polyfillGlobal()
      // when it tries to overwrite properties we've locked as non-configurable below.
      // The locks are intentional — this just keeps the console clean.
      // Suppress both console.warn and console.error since RN logs these on both channels.
      (function() {
        var _warn = console.warn.bind(console);
        var _error = console.error.bind(console);
        var _isFailed = function(m) { return typeof m === 'string' && m.startsWith('Failed to set polyfill'); };
        console.warn = function() { if (_isFailed(arguments[0])) return; _warn.apply(console, arguments); };
        console.error = function() { if (_isFailed(arguments[0])) return; _error.apply(console, arguments); };
      })();

      // React Native's NativeModules expects nativeModuleProxy on web.
      // This MUST run before the bundle: React Native's initializeCore replaces
      // window.setTimeout with a version that calls NativeTiming.createTimer().
      // Without a real Timing module, all timers silently do nothing — React
      // Scheduler never runs, the app never renders.
      if (typeof window.nativeModuleProxy === 'undefined') {
        // Capture browser timers NOW before React Native overwrites them.
        const _setTimeout = window.setTimeout.bind(window);
        const _clearTimeout = window.clearTimeout.bind(window);
        const _setInterval = window.setInterval.bind(window);
        const _clearInterval = window.clearInterval.bind(window);

        // Prevent React Native from replacing window.performance with its async polyfill.
        // RN's polyfill installs g.performance = new PerformanceClass() where .now()
        // returns a Promise — this completely breaks React Scheduler timing comparisons
        // (expirationTime ends up as "[object Object]5000", q() spins forever).
        // A no-op setter keeps the real synchronous performance.now() in place.
        (function() {
          const _realPerf = window.performance;
          Object.defineProperty(window, 'performance', {
            get: function() { return _realPerf; },
            set: function() { /* block RN async polyfill */ },
            configurable: false, enumerable: true,
          });
        })();

        // Prevent React DOM from crashing when it receives an array-form style prop
        // (e.g. style={[s1, s2]}) on a DOM element. React Native supports array styles;
        // React DOM does not — it tries element.style['0'] = obj which throws
        // "Failed to set an indexed property [0] on 'CSSStyleDeclaration'".
        // This happens when RN-Web styled components (Tamagui, gesture-handler) pass
        // array styles to underlying DOM elements. The fix silently ignores numeric
        // CSSStyleDeclaration property sets so React can continue rendering.
        (function() {
          const origStyleGetter = Object.getOwnPropertyDescriptor(HTMLElement.prototype, 'style');
          if (!origStyleGetter) return;
          Object.defineProperty(HTMLElement.prototype, 'style', {
            get: function() {
              const realStyle = origStyleGetter.get.call(this);
              return new Proxy(realStyle, {
                // Must use `target` (not `receiver`/proxy) for all reads so native
                // CSSStyleDeclaration getters and methods receive the correct `this`.
                // Without this, `proxy.cssText` or `proxy.setProperty(...)` would call
                // the native function with `this = proxy` → "Illegal invocation".
                get: function(target, prop) {
                  const value = target[prop];
                  return typeof value === 'function' ? value.bind(target) : value;
                },
                set: function(target, prop, value) {
                  if (typeof prop === 'string' && /^\d+$/.test(prop)) {
                    return true; // silently drop numeric index set
                  }
                  target[prop] = value;
                  return true;
                }
              });
            },
            configurable: true, enumerable: true,
          });
        })();

        // Lock IntersectionObserver to the browser's native version before RN replaces it.
        // React Native 0.85 ships a custom IntersectionObserver polyfill that requires
        // elements to be ReactNativeElement instances. Third-party libraries like
        // @floating-ui (used by React Navigation) call .observe(domElement) with a plain
        // HTMLElement, which throws "parameter 1 is not of type 'ReactNativeElement'",
        // causing React to unmount the entire tree.
        (function() {
          if (window.IntersectionObserver) {
            Object.defineProperty(window, 'IntersectionObserver', {
              value: window.IntersectionObserver,
              configurable: false, writable: false, enumerable: true,
            });
          }
        })();

        // Install setImmediate as a real browser macrotask before React Native can
        // replace it with queueReactNativeMicrotask. React Scheduler calls setImmediate
        // to schedule 5ms work slices; if it maps to an RN microtask, the
        // callReactNativeMicrotasks for-loop spins forever (q re-schedules itself
        // into the same queue being drained). Making it non-configurable prevents
        // polyfillGlobal from overriding it ("Failed to set polyfill" error is harmless).
        if (typeof window.setImmediate === 'undefined') {
          let _immId = 0;
          const _immMap = new Map();
          Object.defineProperty(window, 'setImmediate', {
            value: function setImmediate(fn) {
              const id = ++_immId;
              const args = Array.prototype.slice.call(arguments, 1);
              const tid = _setTimeout(function() {
                _immMap.delete(id);
                fn.apply(null, args);
              }, 0);
              _immMap.set(id, tid);
              return id;
            },
            configurable: false, writable: false, enumerable: false,
          });
          Object.defineProperty(window, 'clearImmediate', {
            value: function clearImmediate(id) {
              const tid = _immMap.get(id);
              if (tid !== undefined) { _clearTimeout(tid); _immMap.delete(id); }
            },
            configurable: false, writable: false, enumerable: false,
          });
        }

        const createNoopModule = () => {
          return new Proxy({}, {
            get: (_, prop) => (...args) => {
              const last = args[args.length - 1];
              if (typeof last === 'function') { last(null, {}); return; }
              return Promise.resolve({});
            }
          });
        };

        // Timing module: React Native routes setTimeout/setInterval through this.
        // We use bridge.getCallableModule('JSTimers').callTimers([id]) rather than
        // callFunctionReturnFlushedQueue because the latter calls flushedQueue() which
        // calls callReactNativeMicrotasks() — a for(;q();) loop that spins forever on web.
        const timerMap = new Map();
        const timingModule = {
          createTimer: (callbackID, duration, jsSchedulingTime, repeats) => {
            const fire = () => {
              const bridge = window.__fbBatchedBridge;
              if (!bridge) return;
              try {
                const JSTimers = bridge.getCallableModule('JSTimers');
                if (JSTimers && JSTimers.callTimers) {
                  JSTimers.callTimers([callbackID]);
                }
              } catch (e) {}
            };
            const id = repeats
              ? _setInterval(fire, duration)
              : _setTimeout(fire, Math.max(0, duration));
            timerMap.set(callbackID, { id, repeats: !!repeats });
          },
          deleteTimer: (callbackID) => {
            const entry = timerMap.get(callbackID);
            if (entry) {
              entry.repeats ? _clearInterval(entry.id) : _clearTimeout(entry.id);
              timerMap.delete(callbackID);
            }
          },
          setSendIdleEvents: () => {},
          getConstants: () => ({}),
        };

        // DeviceInfo.getConstants() must return synchronously with real screen dimensions.
        // React Native's Dimensions module calls this at startup and destructures
        // { screen, window } from the result — returning a Promise causes a fatal crash.
        const scale = window.devicePixelRatio || 1;
        const deviceInfoModule = {
          getConstants: () => ({
            Dimensions: {
              screen: {
                width: window.screen.width,
                height: window.screen.height,
                scale: scale,
                fontScale: 1,
              },
              window: {
                width: window.innerWidth,
                height: window.innerHeight,
                scale: scale,
                fontScale: 1,
              },
            },
            ServerHost: null,
            isTesting: false,
            reactNativeVersion: { major: 0, minor: 85, patch: 3 },
          }),
        };

        window.nativeModuleProxy = new Proxy({}, {
          get: (_, moduleName) => {
            if (moduleName === 'DeviceInfo') return deviceInfoModule;
            if (moduleName === 'Timing') return timingModule;
            return createNoopModule();
          }
        });
      }
    </script>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
</body>
</html>
