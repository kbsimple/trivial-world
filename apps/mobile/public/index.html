<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Trivial World</title>
    <meta name="description" content="In-person social trivia game for groups" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trivial World" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- The `react-native-web` recommended style reset: https://necolas.github.io/react-native-web/docs/setup/#root-element -->
    <style id="expo-reset">
      /* These styles make the body full-height */
      html,
      body {
        height: 100%;
      }
      /* These styles disable body scrolling if you are using <ScrollView> */
      body {
        overflow: hidden;
      }
      /* These styles make the root element full-height */
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
    <!-- Polyfill for React Native NativeModules on web -->
    <script>
      // React Native's NativeModules expects nativeModuleProxy on web.
      // This must run before React Native's bundle evaluates.
      if (typeof window.nativeModuleProxy === 'undefined') {
        const createNoopModule = () => {
          return new Proxy({}, {
            get: (_, prop) => (...args) => {
              const last = args[args.length - 1];
              if (typeof last === 'function') { last(null, {}); return; }
              return Promise.resolve({});
            }
          });
        };

        // DeviceInfo.getConstants() must return synchronously with real screen dimensions.
        // React Native's Dimensions module calls this at startup and destructures
        // { screen, window } from the result — returning a Promise causes a fatal crash.
        const scale = window.devicePixelRatio || 1;
        const deviceInfoModule = {
          getConstants: () => ({
            Dimensions: {
              screen: {
                width: window.screen.width,
                height: window.screen.height,
                scale: scale,
                fontScale: 1,
              },
              window: {
                width: window.innerWidth,
                height: window.innerHeight,
                scale: scale,
                fontScale: 1,
              },
            },
            ServerHost: null,
            isTesting: false,
            reactNativeVersion: { major: 0, minor: 85, patch: 3 },
          }),
        };

        window.nativeModuleProxy = new Proxy({}, {
          get: (_, moduleName) => {
            if (moduleName === 'DeviceInfo') return deviceInfoModule;
            return createNoopModule();
          }
        });
      }
    </script>
  </head>

  <body>
    <!-- Use static rendering with Expo Router to support running without JavaScript. -->
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <!-- The root element for your Expo app. -->
    <div id="root"></div>
</body>
</html>
