# Netlify configuration for Trivial World monorepo
# Two sites: trivial-world-game and trivial-world-generator
#
# Setup in Netlify UI:
#   - Game site (trivial-world.netlify.app): Publish directory = apps/mobile/dist
#   - Generator site (trivial-world-generator.netlify.app): Publish directory = apps/generator/out
#
# IMPORTANT: Both apps use static export (not Next.js runtime)
# - Generator: Next.js static export (output: 'export')
# - Mobile: Expo web export
#
# NOTE: The Next.js plugin is NOT included here because the game site uses Expo.
# If the generator site needs the Next.js plugin, create a separate netlify.toml
# in apps/generator/ with the plugin configuration.

[build]
  # Build both apps with Turborepo
  command = "pnpm install && pnpm build"
  # REQUIRED: Set publish directory in Netlify UI per site:
  #   trivial-world-game site      → publish = "apps/mobile/dist"
  #   trivial-world-generator site → publish = "apps/generator/out"
  # (Cannot be set here because this toml is shared by both sites.)

[build.environment]
  # Node version for build (20 LTS)
  NODE_VERSION = "20"
  # Skip Next.js plugin - game site uses Expo, not Next.js
  NETLIFY_NEXT_PLUGIN_SKIP = "true"

# Production context (main branch)
[context.production]
  command = "pnpm install && pnpm build"

# Deploy preview context (pull requests)
[context.deploy-preview]
  command = "pnpm install && pnpm build"

# Branch deploy context (other branches)
[context.branch-deploy]
  command = "pnpm install && pnpm build"

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"